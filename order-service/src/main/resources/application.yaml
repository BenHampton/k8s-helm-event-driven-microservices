spring:
  application:
    name: order-service
  jpa:
    hibernate:
      ddl-auto: validate        # Liquibase owns the schema; Hibernate only validates
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
  # RabbitMQ *behavior* is identical in every environment, so it lives here.
  # Only the connection + credentials differ per profile (below).
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 1s
          max-attempts: 4
          multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true