server:
  port: 8081
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:notifications}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
  liquibase:
    enabled: failed
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  jpa:
    show-sql: true

logging:
  level:
    com.k8sdemo.notification: DEBUG