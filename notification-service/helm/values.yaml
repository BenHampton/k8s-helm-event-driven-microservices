replicaCount: 1

profile: dev

image:
  repository: docker.io/bhampton29/notification-service
  pullPolicy: Always
  tag: latest

service:
  type: ClusterIP
  port: 8080

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "{{ .Values.profile }}"
  - name: JAVA_OPTS
    value: "-XX:MaxRAMPercentage=75.0"
  - name: DB_HOST
    value: notifications-db   # its OWN database — never notifications-service's
  - name: DB_PORT
    value: "5432"
  - name: DB_NAME
    value: notifications
  - name: RABBITMQ_HOST
    value: rabbitmq           # the one thing both services share
  - name: RABBITMQ_PORT
    value: "5672"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: notification-service-secret
        key: DB_USER
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: notification-service-secret
        key: DB_PASSWORD
  - name: RABBITMQ_USER
    valueFrom:
      secretKeyRef:
        name: notification-service-secret
        key: RABBITMQ_USER
  - name: RABBITMQ_PASSWORD
    valueFrom:
      secretKeyRef:
        name: notification-service-secret
        key: RABBITMQ_PASSWORD

secret:
  DB_USER: notifications
  DB_PASSWORD: notifications
  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: guest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities: { drop: [ "ALL" ] }
  readOnlyRootFilesystem: true

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# -- Expose the service via gateway-api HTTPRoute
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /headers

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: http
  initialDelaySeconds: 20
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes:
  - name: tmp
    emptyDir: {}

volumeMounts:
  - name: tmp
    mountPath: /tmp


nodeSelector: {}

tolerations: []

affinity: {}
