name: notification-service

on:
  push:
    branches: [main]
    paths: ['notification-service/**']              # only when THIS service changes
  pull_request:
    paths: ['notification-service/**']

concurrency:                          # a newer push cancels an in-flight run
  group: notification-service-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/notification-service

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # 1. Compile + test. The gate — and it produces target/app.jar
      - name: Build & test
        run: mvn -B clean verify

      # 2. Only on a push to main: PRs test but never publish.
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build & push slim image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: notification-service                # target/app.jar already built above
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}