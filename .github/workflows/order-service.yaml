name: order-service

on:
  push:
    branches: [main]
    paths: ['order-service/**']              # only when THIS service changes
  pull_request:
    paths: ['order-service/**']
  workflow_dispatch:

concurrency:                          # a newer push cancels an in-flight run
  group: order-service-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/order-service

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: order-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # 1. Compile + test. The gate — and it produces target/app.jar
      - name: Build & Test
        run: mvn -B clean verify

      # 2. Only on a push to main: PRs test but never publish.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Build & push slim image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: order-service                # target/app.jar already built above
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}