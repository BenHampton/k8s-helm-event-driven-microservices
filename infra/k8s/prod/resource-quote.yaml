apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-quote
  namespace: prod
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 6Gi
    limits.cpu: "8"
    limits.memory: 10Gi
    pods: "20"

---

apiVersion: v1
kind: LimitRange
metadata:
  name: prod-limit
  namespace: prod
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi