apiVersion: v1
kind: Service
metadata:
  name: orders-db # name order-service connects to
  namespace: dev
spec:
  type: ExternalName
  externalName: orders-db.data.svc.cluster.local # RDS endpoint, e.g. orders.abc123.us-east-1.rds.amazonaws.com

---

apiVersion: v1
kind: Service
metadata:
  name: notifications-db
  namespace: dev
spec:
  type: ExternalName
  externalName: notifications-db.data.svc.cluster.local

---

apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: dev
spec:
  type: ExternalName
  externalName: rabbitmq.data.svc.cluster.local