apiVersion: v1
kind: Service
metadata:
  name: orders-db # what the app asks for - name order-service connects to
  namespace: dev
spec:
  type: ExternalName
  externalName: orders-db-dev.data.svc.cluster.local # where is lands - RDS endpoint, e.g. orders.abc123.us-east-1.rds.amazonaws.com

---

apiVersion: v1
kind: Service
metadata:
  name: notifications-db
  namespace: dev
spec:
  type: ExternalName
  externalName: notifications-db-dev.data.svc.cluster.local

---

apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: dev
spec:
  type: ExternalName
  externalName: rabbitmq-dev.data.svc.cluster.local