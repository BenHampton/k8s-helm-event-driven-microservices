apiVersion: v1
kind: Secret
metadata:
  name: orders-db-credentials
  namespace: data
type: Opaque
stringData:
  POSTGRES_DB: orders
  POSTGRES_USER: orders
  POSTGRES_PASSWORD: orders

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orders-db
  namespace: data
spec:
  serviceName: order-db
  selector:
    matchLabels:
      app: orders-db
  template:
    metadata:
      labels:
        app: orders-db
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          envFrom:
            - secretRef:
                name: orders-db-credentials
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "orders"] }
            initialDelaySeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

---

apiVersion: v1
kind: Service
metadata:
  name: orders-db
  namespace: data
spec:
  clusterIP: None
  selector:
    app: orders-db
  ports:
    - port: 5423