server {
  # 8080, not 80: binding a port below 1024 needs root or the
  # NET_BIND_SERVICE capability, and the hardened pod has neither.
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: unknown routes fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # proxy API calls to order-service (Kubernetes DNS name).
  # strip /api prefix: /api/orders -> /orders
  location /api/ {
    proxy_pass http://order-service:8080/;
    proxy_set_header Host $host;
  }
}
